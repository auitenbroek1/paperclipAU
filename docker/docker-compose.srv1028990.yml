services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - paperclip-pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        USER_UID: "1001"
        USER_GID: "1001"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3100:3100"
    environment:
      DATABASE_URL: postgres://paperclip:${POSTGRES_PASSWORD}@db:5432/paperclip
      PORT: "3100"
      HOST: "0.0.0.0"
      SERVE_UI: "true"
      PAPERCLIP_HOME: /paperclip
      PAPERCLIP_INSTANCE_ID: default
      PAPERCLIP_CONFIG: /paperclip/instances/default/config.json
      PAPERCLIP_DEPLOYMENT_MODE: authenticated
      PAPERCLIP_DEPLOYMENT_EXPOSURE: private
      PAPERCLIP_PUBLIC_URL: https://srv1028990.hstgr.cloud
      PAPERCLIP_AUTH_PUBLIC_BASE_URL: https://srv1028990.hstgr.cloud
      PAPERCLIP_AUTH_BASE_URL_MODE: explicit
      PAPERCLIP_ALLOWED_HOSTNAMES: srv1028990.hstgr.cloud,72.60.163.11
      PAPERCLIP_MIGRATION_PROMPT: never
      PAPERCLIP_MIGRATION_AUTO_APPLY: "true"
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}
      PAPERCLIP_AGENT_JWT_SECRET: ${PAPERCLIP_AGENT_JWT_SECRET:?PAPERCLIP_AGENT_JWT_SECRET must be set}
      USER_UID: "1001"
      USER_GID: "1001"
      OPENCODE_ALLOW_ALL_MODELS: "true"
    volumes:
      - /srv/paperclip-data:/paperclip

volumes:
  paperclip-pgdata:
